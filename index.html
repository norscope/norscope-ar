<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Norscope AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f8fa; --ink:#12181f; --muted:#5a6470;
    --line:#dee2e7; --accent:#0066cc; --accent-2:#0066cc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:'IBM Plex Mono',monospace;overflow:hidden;}

  #ar-container{position:fixed;inset:0;}

  /* ---- start overlay ---- */
  #start{position:fixed;inset:0;background:var(--bg);z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px;text-align:center;}
  #start h1{font-family:'Space Grotesk',sans-serif;font-size:30px;margin-bottom:6px;}
  #start .tag{color:var(--accent);font-size:12px;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:34px;}
  #start .hint{color:var(--muted);font-size:13px;line-height:1.7;max-width:300px;
    margin-bottom:38px;}
  #start .hint b{color:var(--ink);font-weight:500;}
  #startBtn{padding:16px 44px;background:transparent;border:1px solid var(--accent);
    color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:13px;
    letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
  #startBtn:active{background:var(--accent);color:var(--bg);}
  #fallback{margin-top:26px;font-size:11px;color:var(--muted);}
  #fallback a{color:var(--accent-2);}
  #err{margin-top:20px;color:#c62828;font-size:12px;max-width:320px;line-height:1.6;display:none;}

  /* ---- scanning hint ---- */
  #scanhint{position:fixed;left:0;right:0;bottom:40px;z-index:15;display:none;
    text-align:center;pointer-events:none;}
  #debug{display:none;}
  /* ---- editor mode ---- */
  #ed-toggle{position:fixed;top:14px;right:14px;z-index:30;width:44px;height:44px;
    border-radius:50%;border:none;background:#0066cc;color:#fff;font-size:20px;
    cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.35);}
  #editor{position:fixed;left:0;right:0;bottom:0;z-index:29;
    background:rgba(18,24,31,.94);color:#e7edf2;padding:16px 16px 24px;
    transform:translateY(100%);transition:transform .25s ease;
    font-family:'IBM Plex Mono',monospace;max-height:60vh;overflow-y:auto;}
  #editor.open{transform:translateY(0);}
  #editor select{width:100%;padding:9px;margin-bottom:12px;background:#1b232c;
    color:#e7edf2;border:1px solid #33404d;font-family:inherit;font-size:14px;}
  #editor .row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12px;}
  #editor .row label{width:34px;color:#7c8a99;text-transform:uppercase;letter-spacing:.06em;}
  #editor .row input[type=range]{flex:1;accent-color:#0066cc;}
  #editor .row .v{width:52px;text-align:right;color:#4fd1c5;}
  #ed-export{width:100%;margin-top:8px;padding:11px;background:#0066cc;color:#fff;
    border:none;font-family:inherit;font-size:13px;letter-spacing:.08em;cursor:pointer;}
  #ed-out{width:100%;margin-top:10px;height:110px;display:none;background:#0f151b;
    color:#8fe;border:1px solid #33404d;font-family:inherit;font-size:11px;padding:8px;}

  .pulse{animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
</style>
</head>
<body>

<div id="ar-container"></div>

<div id="start">
  <h1>Norscope</h1>
  <div class="tag">AR-Erlebnis</div>
  <p class="hint">
    Kamera erlauben und auf die <b>Rückseite der Norscope-Karte</b> richten.
    Die Karte am besten flach hinlegen. Der Pitch und die Founder erscheinen
    direkt auf der Karte.
  </p>
  <button id="startBtn">Start</button>
  <div id="fallback">Kamera-Probleme? <a href="viewer.html">3D-Ansicht ohne Karte öffnen</a></div>
  <div id="err"></div>
</div>

<div id="scanhint"><span class="pulse">KARTE VOR DIE KAMERA HALTEN</span></div>
<div id="debug"></div>

<button id="ed-toggle" title="Editor">✎</button>
<div id="editor">
  <select id="ed-sel"></select>
  <div class="row"><label>X</label><input type="range" id="ed-x" min="-0.7" max="0.7" step="0.005"><span class="v" id="val-x">0</span></div>
  <div class="row"><label>Y (↕)</label><input type="range" id="ed-y" min="-1.1" max="1.1" step="0.005"><span class="v" id="val-y">0</span></div>
  <div class="row"><label>Z (↔ vor)</label><input type="range" id="ed-z" min="0" max="0.3" step="0.005"><span class="v" id="val-z">0</span></div>
  <div class="row"><label>Dreh</label><input type="range" id="ed-rot" min="-1.6" max="1.6" step="0.02"><span class="v" id="val-rot">0</span></div>
  <div class="row"><label>Größe</label><input type="range" id="ed-scl" min="0.4" max="2.2" step="0.02"><span class="v" id="val-scl">1</span></div>
  <button id="ed-export">Werte anzeigen / kopieren</button>
  <textarea id="ed-out" readonly></textarea>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { MindARThree } from 'mindar-image-three';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

const startEl = document.getElementById('start');
const errEl = document.getElementById('err');
const scanhint = document.getElementById('scanhint');
const debugEl = document.getElementById('debug');
let debugLines = [];
let pitchStand;
let exporting = false;
function debugLog(line) {
  debugLines.push(line);
  if (debugLines.length > 7) debugLines.shift();
  debugEl.textContent = debugLines.join('\n');
  fetch('/log', { method: 'POST', body: line }).catch(() => {});
}
window.addEventListener('error', (e) => {
  debugLog('JS ERROR: ' + e.message + ' in ' + e.filename + ':' + e.lineno);
});
window.addEventListener('unhandledrejection', (e) => {
  debugLog('JS REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});
debugLog('Seite geladen: ' + new Date().toLocaleTimeString());

  const params = new URLSearchParams(window.location.search);
  if (params.get('export') === 'true') {
    setTimeout(() => {
      document.getElementById('startBtn').click();
    }, 500);
  }

// Any uncaught async failure (e.g. a missing .glb on the server) becomes a
// visible message instead of a silent dead button.
window.addEventListener('unhandledrejection', (e) => {
  startEl.style.display = 'flex';
  errEl.textContent = 'Fehler beim Laden: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) +
    ' — prüfe, ob alle Dateien im assets-Ordner auf GitHub liegen.';
  errEl.style.display = 'block';
  debugLog('FEHLER: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});

// Cache-busting: mind-ar's internal fetch of imageTargetSrc uses the plain
// URL with no cache-control, so browsers/CDNs can serve a stale .mind file
// independently of the page's own ?v=N. Appending a fresh timestamp here
// makes that structurally impossible — every load requests a brand-new URL.
const TARGETS_URL = './assets/targets.mind?v=' + Date.now();

async function checkTargets() {
  try {
    const r = await fetch(TARGETS_URL, { method: 'HEAD', cache: 'no-store' });
    // Log the ACTUAL bytes the browser received for this exact request —
    // this is the one fact that definitively confirms or rules out a stale
    // cached .mind file, instead of guessing from symptoms.
    const len = r.headers.get('content-length');
    const age = r.headers.get('age');
    debugLog('targets.mind: ' + (len ? len + ' bytes' : '?') + (age ? ' (age ' + age + 's)' : ' (frisch)'));
    return r.ok;
  } catch (e) { debugLog('targets.mind Fetch-Fehler: ' + e.message); return false; }
}

document.getElementById('startBtn').addEventListener('click', async () => {
  errEl.style.display = 'none';

  if (!(await checkTargets())) {
    errEl.textContent = 'assets/targets.mind fehlt noch. Bitte das Tracking-Target kompilieren (siehe README, Schritt "Tracking-Target").';
    errEl.style.display = 'block';
    return;
  }

  const mindarThree = new MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: TARGETS_URL,
    uiScanning: 'no',
    uiLoading: 'yes',
    filterMinCF: 0.001,     // community-validated smooth values (aggressive
    filterBeta: 10          // demo values caused visible vibration — see README)
  });
  const { renderer, scene, camera } = mindarThree;
  renderer.toneMapping = THREE.NoToneMapping;   // ACES crushed whites to gray
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x9098a4, 2.1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const dir = new THREE.DirectionalLight(0xffffff, 1.7);
  dir.position.set(0.4, 1, 0.9);
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0xcfe0ff, 0.9);
  fill.position.set(-0.7, 0.4, 0.5);
  scene.add(fill);
  const front = new THREE.DirectionalLight(0xffffff, 0.7);
  front.position.set(0, 0.2, 1.2);
  scene.add(front);

  const anchor = mindarThree.addAnchor(0);

  // ---- editor state (declared EARLY: setupEditor is called later in this
  // same scope, and let/const after the call site would crash with a
  // temporal-dead-zone ReferenceError, killing the whole start flow) ----
  let editTarget = null;
  const editBase = new Map();
  function isEditing(obj) { return editTarget === obj; }
  function editBaseZ(obj, fb) { const b = editBase.get(obj); return b ? b.z : fb; }
  function editBaseScale(obj, fb) { const b = editBase.get(obj); return b ? b.scale : fb; }

  // billboard bookkeeping: these yaw toward the camera around the card normal
  const billboards = [];          // groups in `flat` space (card XY, normal +Z)
  const founderBillboards = [];   // nameplates inside founder groups
  const camWorld = new THREE.Vector3();
  const camLocal = new THREE.Vector3();
  const gLocal = new THREE.Vector3();
  const camSmoothWorld = new THREE.Vector3();   // low-pass filtered camera position (world space)
  let camSmoothInit = false;
  const anchorPos = new THREE.Vector3();
  const anchorQuat = new THREE.Quaternion();
  const anchorScale = new THREE.Vector3();
  const SCENE_SCALE = 1.0;
  const root = new THREE.Group();
  root.scale.setScalar(0.001);
  root.visible = false;
  // root is a SIBLING of anchor.group (both children of mindarThree.scene),
  // not a rigid child of it. anchor.group carries MindAR's raw per-frame
  // tracked pose, which has inherent jitter even with good filter settings
  // (this is a known MindAR limitation, not something filterMinCF/filterBeta
  // alone can fully solve). Every frame, root's transform smoothly chases
  // anchor.group's transform instead of copying it rigidly — this is the
  // "custom smoothing on top of the raw tracked pose" the MindAR maintainers
  // themselves recommend, and it damps jitter for EVERY object in the scene
  // at once, not just the billboarded ones (which is all the earlier fixes
  // in this file addressed).
  scene.add(root);
  let anchorSmoothInit = false;

  // The MindAR image-target plane already faces the viewer (the card's printed
  // face). So content authored upright in XY stands upright ON the card — no
  // extra flattening. `flat` is a pass-through group; `STAND_UP = 0` means the
  // panel/logo/button keep their authored upright orientation. Rings that
  // should lie ON the card surface get their own local rotation where added.
  const flat = new THREE.Group();
  root.add(flat);
  const STAND_UP = 0;

  const loader = new GLTFLoader();
  loader.setMeshoptDecoder(MeshoptDecoder);
  const load = (url) => new Promise((res, rej) => loader.load(url, res, undefined, rej));
  // UI elements render UNLIT: pure vertex colors, no shading -> crisp like print.
  // DoubleSide is deliberate: with the nested billboard/pop-up rotations, a sign
  // error in the yaw math could otherwise point the front face away from the
  // camera and make the whole panel vanish (exactly what happened before this
  // fix) — double-sided geometry makes that entire failure mode impossible.
  function makeUnlit(objRoot) {
    objRoot.traverse((c) => {
      if (c.isMesh) c.material = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide });
    });
    return objRoot;
  }

  // ---- helper: soft glow ring (additive, no texture needed) ----
  function glowRing(radius, thickness, color, opacity) {
    const geo = new THREE.RingGeometry(radius - thickness, radius + thickness, 64);
    const mat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity, side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const ring = new THREE.Mesh(geo, mat);
    ring.rotation.x = -Math.PI / 2;
    return ring;
  }
  // ---- helper: soft vertical holographic beam ----
  function beam(height, radius, color) {
    const geo = new THREE.CylinderGeometry(radius, radius * 1.6, height, 20, 1, true);
    const mat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.10, side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const m = new THREE.Mesh(geo, mat);
    m.position.y = height / 2;
    return m;
  }

  const glowPulses = [];  // {mesh, base}

  // ================= headset — smaller floating accent, right of the pitch card =================
  const heroGroup = new THREE.Group();
  const headset = (await load('./assets/headset.glb')).scene;
  const hbox = new THREE.Box3().setFromObject(headset);
  const hc = hbox.getCenter(new THREE.Vector3());
  const hScale = 0.10 / (hbox.max.x - hbox.min.x);   // smaller accent, 10cm
  headset.scale.setScalar(hScale);
  headset.position.set(-hc.x * hScale, -hc.y * hScale, -hc.z * hScale);
  headset.updateMatrixWorld(true);

  const productGroup = new THREE.Group();
  headset.traverse((child) => {
    if (!child.isMesh) return;
    const solid = new THREE.Mesh(child.geometry, new THREE.MeshStandardMaterial({
      color: 0x1c2229, roughness: 0.42, metalness: 0.25,
    }));
    solid.applyMatrix4(child.matrixWorld);
    productGroup.add(solid);
  });

  const headsetSpin = new THREE.Group();
  headsetSpin.add(productGroup);
  const headsetTilt = new THREE.Group();
  headsetTilt.add(headsetSpin);
  headsetTilt.rotation.x = -0.25;
  headsetTilt.position.y = 0.075;               // hover height above the card
  heroGroup.add(headsetTilt);

  const heroRing1 = glowRing(0.062, 0.0032, 0x0066cc, 0.5);
  const heroRing2 = glowRing(0.078, 0.0016, 0x0066cc, 0.28);
  heroRing1.position.y = 0.001; heroRing2.position.y = 0.001;   // on the card surface
  
  const scanBeam = beam(0.12, 0.05, 0x00a3ff);
  scanBeam.visible = false;
  
  heroGroup.add(heroRing1, heroRing2, scanBeam);
  glowPulses.push({ mesh: heroRing1, base: 0.5 }, { mesh: heroRing2, base: 0.28 });

  heroGroup.rotation.x = 0; // stands upright relative to pitchStand
  // (Will be positioned and added to pitchStand instead)

  // ================= HERO: the pitch card — Canvas-based 3D Hologram Panel =================
  const pitchGroup = new THREE.Group();     // outer: pop-up group
  
  const pitchCanvas = document.createElement('canvas');
  pitchCanvas.width = 2048; pitchCanvas.height = 3072;
  const pCtx = pitchCanvas.getContext('2d');
  const pTex = new THREE.CanvasTexture(pitchCanvas);
  
  // Configure high-quality filtering
  pTex.minFilter = THREE.LinearFilter;
  pTex.generateMipmaps = false;
  
  const pMat = new THREE.MeshBasicMaterial({ map: pTex, transparent: true, side: THREE.DoubleSide });
  const pPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.38, 0.57), pMat);

  // ---- combined 3D logo + NORSCOPE lockup, crowning the top of the Pitch Card (flattened!) ----
  const lockup = makeUnlit((await load('./assets/logo-lockup.glb')).scene);
  lockup.scale.set(1.0, 1.0, 0.01); // mathematically flat (zero Z-depth!), scaled down to prevent bleed
  lockup.position.set(0.0, 0.21, 0.001); // positioned higher (near top edge y=0.285)
  pPlane.add(lockup);
  
  let simStatusText = '> NORSCOPE AR ENGINE. OFFLINE-FIRST.';
  
  function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let currentY = y;
    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + ' ';
      const metrics = context.measureText(testLine);
      const testWidth = metrics.width;
      if (testWidth > maxWidth && n > 0) {
        context.fillText(line, x, currentY);
        line = words[n] + ' ';
        currentY += lineHeight;
      } else {
        line = testLine;
      }
    }
    context.fillText(line, x, currentY);
  }
  
  function drawPitchText() {
    pCtx.fillStyle = '#f8fafc'; // Slate-50 light background
    pCtx.fillRect(0, 0, 2048, 3072);
    
    // Deep blue accent border
    pCtx.strokeStyle = '#0284c7';
    pCtx.lineWidth = 36;
    pCtx.strokeRect(50, 50, 1948, 2972);
    
    // Large, punchy, novel statement (shifted down to leave space for flat logo model at top)
    pCtx.textAlign = 'left';
    pCtx.fillStyle = '#0284c7'; // Accent sky blue
    pCtx.font = 'bold 128px sans-serif';
    wrapText(pCtx, 'Die Zukunft der Instandhaltung.', 160, 840, 1728, 160);
    
    // Minimal high-impact novel pitch
    const bullets = [
      { title: 'AR-ANLEITUNGEN', desc: 'Schritte erscheinen als Overlays direkt auf echten Industrieanlagen.' },
      { title: 'OFFLINE-FIRST', desc: 'Arbeitet komplett ohne Netz in jedem Keller und jeder Werkhalle.' },
      { title: 'AUTO-PROTOKOLL', desc: 'Automatischer Instandhaltungsnachweis ganz ohne Schreibarbeit.' }
    ];
    
    bullets.forEach((bullet, index) => {
      const y = 1320 + index * 500;
      
      // Title
      pCtx.fillStyle = '#0f172a';
      pCtx.font = 'bold 92px sans-serif';
      pCtx.fillText(bullet.title, 160, y);
      
      // Description
      pCtx.fillStyle = '#475569'; // Slate-600
      pCtx.font = '68px sans-serif';
      wrapText(pCtx, bullet.desc, 160, y + 108, 1728, 92);
    });
    
    // Clean static tagline at bottom (Simulation text under Headset is gone)
    pCtx.fillStyle = '#0284c7';
    pCtx.font = 'bold 68px monospace';
    pCtx.fillText(simStatusText, 160, 2860);
    
    pTex.needsUpdate = true;
  }
  
  drawPitchText();
  
  pitchStand = new THREE.Group();
  pitchStand.rotation.x = Math.PI / 2;
  pitchStand.add(pPlane);
  // Float headset above the top edge of the pitch billboard (using user coordinates)
  heroGroup.position.set(0.040, 0.355, 0.000);
  heroGroup.rotation.y = 0.00;
  heroGroup.scale.setScalar(1.00);
  pitchStand.add(heroGroup);

  pitchGroup.add(pitchStand);
  pitchGroup.position.set(0.090, 0.500, 0.270);
  pitchGroup.rotation.y = 0.22;
  pitchGroup.scale.setScalar(1.72);
  flat.add(pitchGroup);
  billboards.push(pitchGroup);

  // ================= CTA button — below the pitch card =================
  const cta = makeUnlit((await load('./assets/cta-button.glb')).scene);
  cta.scale.setScalar(1.50); // enlarge CTA button by 50%
  const ctaGroup = new THREE.Group();       // outer: rigid pop-up
  const ctaStand = new THREE.Group();
  ctaStand.rotation.x = Math.PI / 2;
  ctaStand.position.z = 0.03;                 // slight lift above the card
  ctaStand.add(cta);
  ctaGroup.add(ctaStand);
  ctaGroup.position.set(0.000, -0.395, 0.000);   // using user coordinates
  ctaGroup.rotation.y = 0.08;
  ctaGroup.scale.setScalar(1.84);
  flat.add(ctaGroup);
  billboards.push(ctaGroup);

  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  let ctaArmed = false;
  function tryTapCTA(clientX, clientY) {
    if (!ctaArmed) return;
    if (editTarget !== null) return; // Disable clicks during editing/positioning
    const canvas = renderer.domElement;
    const rect = canvas.getBoundingClientRect();
    pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    
    // Check main contact CTA
    const hitsCTA = raycaster.intersectObject(ctaGroup, true);
    if (hitsCTA.length > 0) {
      window.location.href = 'https://www.norscope.com/#/contact';
      return;
    }
  }
  const arContainer = document.getElementById('ar-container');
  arContainer.addEventListener('pointerup', (e) => tryTapCTA(e.clientX, e.clientY));
  arContainer.addEventListener('touchend', (e) => {
    if (e.changedTouches && e.changedTouches.length) {
      tryTapCTA(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
  }, { passive: true });

  // ================= 3. founder — stands UPRIGHT beside the card (to the left) =================
  const mixers = [];
  async function addFounder(avatarUrl, stageUrl, x, y, leanInward) {
    const g = new THREE.Group();

    // projection ring lies flat on the card at their feet (single ring)
    const ring = glowRing(0.055, 0.0032, 0x0066cc, 0.5);
    ring.position.y = 0.001;   // flat on the card
    g.add(ring);
    glowPulses.push({ mesh: ring, base: 0.5 });

    // avatar stands upright (its GLB is already Y-up), tall and prominent
    const gltf = await load(avatarUrl);
    const av = gltf.scene;
    const abox = new THREE.Box3().setFromObject(av);
    const h = abox.max.y - abox.min.y;
    const s = 0.42 / h;                              // TALL — 42cm, overtops the card
    av.scale.setScalar(s);
    av.position.set(0, -abox.min.y * s, 0.0);
    av.rotation.y = leanInward;
    g.add(av);

    if (gltf.animations && gltf.animations.length) {
      const mixer = new THREE.AnimationMixer(av);
      mixer.clipAction(gltf.animations[0]).play();
      mixers.push(mixer);
    }

    // nameplate: billboarded so the name reads from every angle.
    // Inside g (which is rotX 90), the card normal is g's local +Y.
    const stage = makeUnlit((await load(stageUrl)).scene);
    const npYaw = new THREE.Group();
    stage.position.set(0, 0.022, 0.055);
    npYaw.add(stage);
    g.add(npYaw);
    founderBillboards.push({ yaw: npYaw, holder: g });

    g.rotation.x = Math.PI / 2;                 // pop-up: stands out of the card
    g.position.set(x, y, 0.005);
    flat.add(g);
    return g;
  }

  // LEFT, rising from mid-card and overtopping toward center (MyWebAR/Karolina style)
  const saraGroup = await addFounder('./assets/sara-avatar.glb', './assets/stage-sara.glb', -0.460, -0.040, 0.00);
  saraGroup.scale.setScalar(1.38);

  // RIGHT, rising from mid-card (replacing headset, using Sara's avatar as requested for high-quality placeholder)
  const siddhantGroup = await addFounder('./assets/sara-avatar.glb', './assets/stage-siddhant.glb', 0.700, 0.020, 0.00);
  siddhantGroup.scale.setScalar(1.00);

  billboards.push(saraGroup);
  billboards.push(siddhantGroup);

  // ---- soft contact shadows on the card under each element ----
  function contactShadow(radius, x, y, opacity) {
    const m = new THREE.Mesh(
      new THREE.CircleGeometry(radius, 40),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity, depthWrite: false })
    );
    m.position.set(x, y, 0.002);
    flat.add(m);
    return m;
  }
  contactShadow(0.16, 0.090, 0.500, 0.07);     // pitch (using user position x=0.09, y=0.50)
  contactShadow(0.075, -0.460, -0.040, 0.09); // sara (using user position)
  contactShadow(0.075, 0.700, 0.020, 0.09);   // siddhant (using user position)
  contactShadow(0.10, 0.000, -0.395, 0.06);    // cta (using user position)

  // ---- staged entrance: elements pop in one after another with overshoot ----
  const entrances = [
    { obj: pitchGroup,    delay: 0 },
    { obj: saraGroup,     delay: 150 },
    { obj: siddhantGroup, delay: 300 },
    { obj: heroGroup,     delay: 450 },
    { obj: ctaGroup,      delay: 600 },
  ];
  // capture each object's authored scale BEFORE zeroing for the entrance
  // animation — read after zeroing would always be 0.0001 (this fed a bug
  // into the editor's scale slider baseline).
  entrances.forEach(e => { e.base = e.obj.scale.x; });
  entrances.forEach(e => { e.obj.scale.setScalar(0.0001); });
  function easeOutBack(p) { const c = 1.70158; return 1 + (c + 1) * Math.pow(p - 1, 3) + c * Math.pow(p - 1, 2); }
 
  // ================= EDITOR MODE — live positioning, like Adobe Aero =================
  // Registered elements the editor can move/rotate/scale. Base scale captured
  // so the scale slider is relative to each element's authored size.
  const baseScaleOf = (obj) => entrances.find(e => e.obj === obj).base;
  const EDITABLE = [
    { name: 'Pitch-Karte',   obj: pitchGroup,    baseScale: baseScaleOf(pitchGroup) },
    { name: 'Sara (Avatar)', obj: saraGroup,     baseScale: baseScaleOf(saraGroup) },
    { name: 'Siddhant (Av)', obj: siddhantGroup, baseScale: baseScaleOf(siddhantGroup) },
    { name: 'Headset',       obj: heroGroup,     baseScale: baseScaleOf(heroGroup) },
    { name: 'Kontakt-Button',obj: ctaGroup,      baseScale: baseScaleOf(ctaGroup) },
  ];
  setupEditor(EDITABLE);

  // (editor state is declared early, right after the anchor — see above)

  function setupEditor(list) {
    // Seed with each element's TRUE authored scale (list[i].baseScale, captured
    // before the entrance animation zeroed it out) — not the live .scale.x,
    // which at this point in execution is still 0.0001 (entrance hasn't run
    // yet). Reading the live value here was the actual bug behind the
    // invisible CTA button: its idle pulse used this stored value as a
    // multiplier every frame, permanently collapsing it to near-zero size
    // shortly after its entrance animation finished.
    list.forEach(e => editBase.set(e.obj, { z: e.obj.position.z, scale: e.baseScale }));
    const $ = (id) => document.getElementById(id);
    const panel = $('editor');
    const sel = $('ed-sel');
    list.forEach((e, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = e.name; sel.appendChild(o);
    });
    const ctrls = ['x','y','z','rot','scl'];
    function syncFrom(e) {
      $('ed-x').value = e.obj.position.x;
      $('ed-y').value = e.obj.position.y;
      $('ed-z').value = e.obj.position.z;
      $('ed-rot').value = e.obj.rotation.y;
      $('ed-scl').value = e.obj.scale.x / e.baseScale;
      $('val-x').textContent = (+$('ed-x').value).toFixed(3);
      $('val-y').textContent = (+$('ed-y').value).toFixed(3);
      $('val-z').textContent = (+$('ed-z').value).toFixed(3);
      $('val-rot').textContent = (+$('ed-rot').value).toFixed(2);
      $('val-scl').textContent = (+$('ed-scl').value).toFixed(2);
    }
    let current = list[0];
    function select(i) {
      current = list[i];
      editTarget = current.obj;
      // Do not overwrite editBase here to prevent capturing active Z-bob or scale pulse.
      syncFrom(current);
    }
    sel.addEventListener('change', () => select(+sel.value));
    $('ed-x').addEventListener('input', () => { current.obj.position.x = +$('ed-x').value; $('val-x').textContent = (+$('ed-x').value).toFixed(3); });
    $('ed-y').addEventListener('input', () => { current.obj.position.y = +$('ed-y').value; $('val-y').textContent = (+$('ed-y').value).toFixed(3); });
    $('ed-z').addEventListener('input', () => {
      current.obj.position.z = +$('ed-z').value;
      const existing = editBase.get(current.obj);
      const s = existing ? existing.scale : current.baseScale;
      editBase.set(current.obj, { z: +$('ed-z').value, scale: s });
      $('val-z').textContent = (+$('ed-z').value).toFixed(3);
    });
    $('ed-rot').addEventListener('input', () => { current.obj.rotation.y = +$('ed-rot').value; $('val-rot').textContent = (+$('ed-rot').value).toFixed(2); });
    $('ed-scl').addEventListener('input', () => {
      const s = +$('ed-scl').value * current.baseScale;
      current.obj.scale.setScalar(s);
      const existing = editBase.get(current.obj);
      const zVal = existing ? existing.z : current.obj.position.z;
      editBase.set(current.obj, { z: zVal, scale: s });
      $('val-scl').textContent = (+$('ed-scl').value).toFixed(2);
    });
    $('ed-export').addEventListener('click', async () => {
      const lines = list.map(e => {
        const p = e.obj.position, r = e.obj.rotation, sc = (e.obj.scale.x / e.baseScale);
        return `${e.name}: pos(${p.x.toFixed(3)}, ${p.y.toFixed(3)}, ${p.z.toFixed(3)})  rotY=${r.y.toFixed(2)}  scale=${sc.toFixed(2)}`;
      }).join('\n');
      $('ed-out').value = lines; $('ed-out').style.display = 'block'; $('ed-out').select();

      // Trigger automatic GLB export and upload to /upload
      exporting = true;
      try {
        debugLog('Starte GLB-Export...');
        
        // 1. Save original transforms
        const saved = [
          { obj: pitchGroup, pos: pitchGroup.position.clone(), rot: pitchGroup.rotation.clone(), scl: pitchGroup.scale.clone() },
          { obj: ctaGroup, pos: ctaGroup.position.clone(), rot: ctaGroup.rotation.clone(), scl: ctaGroup.scale.clone() },
          { obj: saraGroup, pos: saraGroup.position.clone(), rot: saraGroup.rotation.clone(), scl: saraGroup.scale.clone() },
          { obj: siddhantGroup, pos: siddhantGroup.position.clone(), rot: siddhantGroup.rotation.clone(), scl: siddhantGroup.scale.clone() }
        ];
        
        // 2. Set default static transforms matching user coordinates
        pitchGroup.position.set(0.090, 0.500, 0.270);
        pitchGroup.rotation.set(0, 0.22, 0);
        pitchGroup.scale.setScalar(1.72);
        
        ctaGroup.position.set(0.000, -0.395, 0.000);
        ctaGroup.rotation.set(0, 0.08, 0);
        ctaGroup.scale.setScalar(1.84);
        
        saraGroup.position.set(-0.460, -0.040, 0.005);
        saraGroup.rotation.set(Math.PI / 2, 0, 0);
        saraGroup.scale.setScalar(1.38);
        
        siddhantGroup.position.set(0.700, 0.020, 0.005);
        siddhantGroup.rotation.set(Math.PI / 2, 0, 0);
        siddhantGroup.scale.setScalar(1.00);
        
        // Update matrix worlds so that exporter sees the new positions
        pitchGroup.updateMatrixWorld(true);
        ctaGroup.updateMatrixWorld(true);
        saraGroup.updateMatrixWorld(true);
        siddhantGroup.updateMatrixWorld(true);
        
        // 3. Create temp scene for export
        const exportScene = new THREE.Scene();
        exportScene.add(pitchGroup);
        exportScene.add(ctaGroup);
        exportScene.add(saraGroup);
        exportScene.add(siddhantGroup);
        
        // 4. Run GLTFExporter
        const exporter = new GLTFExporter();
        exporter.parse(
          exportScene,
          async (glbBuffer) => {
            // Restore groups to flat parent
            saved.forEach(s => {
              flat.add(s.obj);
              s.obj.position.copy(s.pos);
              s.obj.rotation.copy(s.rot);
              s.obj.scale.copy(s.scl);
              s.obj.updateMatrixWorld(true);
            });
            exporting = false;
            
            debugLog('Export erfolgreich: ' + glbBuffer.byteLength + ' Bytes');
            
            // Upload to Python server
            try {
              const blob = new Blob([glbBuffer], { type: 'application/octet-stream' });
              const res = await fetch('/upload', {
                method: 'POST',
                body: blob
              });
              if (res.ok) {
                debugLog('GLB erfolgreich hochgeladen!');
              } else {
                debugLog('Upload-Fehler: ' + res.statusText);
              }
            } catch (uploadErr) {
              debugLog('Upload-Fehler: ' + uploadErr.message);
            }
          },
          (parseErr) => {
            // Restore groups to flat parent
            saved.forEach(s => {
              flat.add(s.obj);
              s.obj.position.copy(s.pos);
              s.obj.rotation.copy(s.rot);
              s.obj.scale.copy(s.scl);
              s.obj.updateMatrixWorld(true);
            });
            exporting = false;
            debugLog('Export-Fehler: ' + parseErr.message);
          },
          { binary: true }
        );
      } catch (err) {
        exporting = false;
        debugLog('Export-Fehler: ' + err.message);
      }
    });
    $('ed-toggle').addEventListener('click', () => {
      const open = panel.classList.toggle('open');
      $('ed-toggle').textContent = open ? '×' : '✎';
      if (!open) editTarget = null; else select(+sel.value);
    });
    select(0);
    editTarget = null;   // idle animation runs until the user opens the editor
  }

  // ================= reveal + idle animation =================
  let revealT = null;
  let foundCount = 0;
  let targetVisible = false;
  anchor.onTargetFound = () => {
    foundCount++;
    debugLog('✓ Ziel erkannt (#' + foundCount + ') ' + new Date().toLocaleTimeString());
    scanhint.style.display = 'none';
    revealT = performance.now();
    ctaArmed = true;
    targetVisible = true;
    anchorSmoothInit = false;   // snap to the fresh pose next frame instead of gliding in
  };
  anchor.onTargetLost = () => {
    debugLog('Ziel verloren ' + new Date().toLocaleTimeString());
    scanhint.style.display = 'block'; ctaArmed = false;
    targetVisible = false;
  };
  try {
    debugLog('mindarThree.start() läuft...');
    await mindarThree.start();
    debugLog('AR gestartet, Kamera läuft. Warte auf Ziel...');
    startEl.style.display = 'none';
    scanhint.style.display = 'block';
    const clock = new THREE.Clock();
    
    // AR Maintenance Simulation state machine variables
    let simState = 'idle';
    let simStartTime = 0;
    function startMaintenanceSimulation() {
      if (simState === 'idle') {
        simState = 'scanning';
        simStartTime = clock.getElapsedTime();
        simStatusText = '> DIAGNOSTICS: RUNNING SCAN...';
        drawPitchText();
        
        btnCtx.fillStyle = 'rgba(12, 16, 22, 0.95)';
        btnCtx.fillRect(0, 0, 256, 64);
        btnCtx.strokeRect(2, 2, 252, 60);
        btnCtx.fillStyle = '#ff8a3d';
        btnCtx.fillText('SCANNING...', 128, 32);
        btnTex.needsUpdate = true;
      } else if (simState === 'completed') {
        simState = 'idle';
        heroRing1.material.color.setHex(0x0066cc);
        heroRing2.material.color.setHex(0x0066cc);
        
        btnCtx.fillStyle = 'rgba(12, 16, 22, 0.95)';
        btnCtx.fillRect(0, 0, 256, 64);
        btnCtx.strokeRect(2, 2, 252, 60);
        btnCtx.fillStyle = '#00ffcc';
        btnCtx.fillText('SIMULATION', 128, 32);
        btnTex.needsUpdate = true;

        simStatusText = '> SYSTEM ONLINE. READY TO TEST.';
        drawPitchText();
      }
    }


    renderer.setAnimationLoop(() => {
     try {
      if (exporting) {
        renderer.render(scene, camera);
        return;
      }
      const dt = clock.getDelta();
      const t = clock.elapsedTime;
      mixers.forEach(m => m.update(dt));
 
      // scan-in reveal scale factor: applied to root's tracking scale
      let revealScale = 1.0;
      if (revealT !== null) {
        const el = performance.now() - revealT;
        const p = Math.min(1, el / 350);
        revealScale = 0.001 + (1 - Math.pow(1 - p, 3)) * (SCENE_SCALE - 0.001);
        let allDone = p >= 1;
        entrances.forEach(e => {
          const ep = Math.min(1, Math.max(0, (el - 250 - e.delay) / 420));
          e.obj.scale.setScalar(Math.max(0.0001, e.base * easeOutBack(ep)));
          if (ep < 1) allDone = false;
        });
        if (allDone) revealT = null;
      }
 
      // Smoothly chase MindAR's raw tracked pose
      anchor.group.updateMatrixWorld(true);
      root.visible = targetVisible;
      if (root.visible) {
        anchor.group.matrixWorld.decompose(anchorPos, anchorQuat, anchorScale);
        
        const finite = Number.isFinite(anchorPos.x) && Number.isFinite(anchorPos.y) && Number.isFinite(anchorPos.z)
          && Number.isFinite(anchorQuat.x) && Number.isFinite(anchorQuat.y) && Number.isFinite(anchorQuat.z) && Number.isFinite(anchorQuat.w)
          && anchorScale.x !== 0;
        if (finite) {
          const lambda = 6.0;   // lowered to 6.0 for stronger low-pass noise filtering
          const k = 1 - Math.exp(-lambda * dt);
          
          // Multiply target scale by the reveal animation factor so it grows smoothly
          const targetScale = new THREE.Vector3().copy(anchorScale).multiplyScalar(revealScale);
          
          if (!anchorSmoothInit) {
            root.position.copy(anchorPos);
            root.quaternion.copy(anchorQuat);
            root.scale.copy(targetScale);
            anchorSmoothInit = true;
          } else {
            root.position.lerp(anchorPos, k);
            root.quaternion.slerp(anchorQuat, k);
            root.scale.lerp(targetScale, k);
          }
        }
        if (Math.floor(t * 2) !== Math.floor((t - dt) * 2)) {
          debugLog('pos ' + root.position.x.toFixed(2) + ',' + root.position.y.toFixed(2) + ',' + root.position.z.toFixed(2)
            + ' scl ' + anchorScale.x.toFixed(2) + ' rScl ' + root.scale.x.toFixed(3) + ' fin=' + finite);
        }

        // ---- Billboard (frontal facing & keep upright) logic for registered elements ----
        camera.getWorldPosition(camWorld);
        if (!camSmoothInit) {
          camSmoothWorld.copy(camWorld);
          camSmoothInit = true;
        } else {
          camSmoothWorld.lerp(camWorld, 0.1); // smooth low-pass camera tracker
        }
        
        const objWorldPos = new THREE.Vector3();
        const zAxis = new THREE.Vector3();
        const xAxis = new THREE.Vector3();
        const worldUp = new THREE.Vector3(0, 1, 0);
        const matrix = new THREE.Matrix4();
        const targetQuat = new THREE.Quaternion();
        const parentWorldQuat = new THREE.Quaternion();
        const offsetQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);
        
        // 1. Billboards (pitchGroup, ctaGroup, saraGroup, siddhantGroup)
        // These are kept upright relative to world UP and yawed to face the camera.
        billboards.forEach(b => {
          if (!isEditing(b)) {
            // Get current billboard's world position
            b.getWorldPosition(objWorldPos);
            
            // Calculate vector from billboard to smooth camera position
            zAxis.subVectors(camSmoothWorld, objWorldPos);
            
            // Lock rotation to vertical axis by setting Y delta to 0 (cylindrical billboarding)
            zAxis.y = 0;
            zAxis.normalize();
            
            if (zAxis.lengthSq() === 0) {
              zAxis.set(0, 0, 1);
            }
            
            // Calculate horizontal X axis (worldUp x zAxis)
            xAxis.crossVectors(worldUp, zAxis).normalize();
            
            // Create orthonormal basis rotation matrix
            matrix.makeBasis(xAxis, worldUp, zAxis);
            targetQuat.setFromRotationMatrix(matrix);
            
            // Apply X rotation offset only to groups whose child has the Math.PI/2 rotation
            if (b === pitchGroup || b === ctaGroup) {
              targetQuat.multiply(offsetQuat);
            }
            
            // Convert to parent's local space
            b.parent.getWorldQuaternion(parentWorldQuat);
            parentWorldQuat.invert();
            b.quaternion.copy(parentWorldQuat).multiply(targetQuat);
          }
        });

        // 2. Founder nameplates inside addFounder groups
        founderBillboards.forEach(fb => {
          fb.holder.worldToLocal(camLocal.copy(camSmoothWorld));
          const dx = camLocal.x - fb.yaw.position.x;
          const dz = camLocal.z - fb.yaw.position.z;
          fb.yaw.rotation.y = Math.atan2(dx, dz);
        });
      } else {
        anchorSmoothInit = false;
        camSmoothInit = false;
      }



      // headset: slow spin (no bobbing to prevent tracking noise amplification)
      headsetSpin.rotation.y = t * 0.5;
      if (!isEditing(heroGroup))  heroGroup.position.z  = editBaseZ(heroGroup, 0.000);
 
      // pitch card (hero) (no bobbing)
      if (!isEditing(pitchGroup)) pitchGroup.position.z = editBaseZ(pitchGroup, 0.270);
 
      // CTA: stationary (no scale-pulsing)
      if (!isEditing(ctaGroup) && revealT === null) {
        ctaGroup.scale.setScalar(editBaseScale(ctaGroup, 1.84));
      }

      // glow pulses on every ring
      glowPulses.forEach(({ mesh, base }, i) => {
        mesh.material.opacity = base * (0.75 + 0.25 * Math.sin(t * 2.2 + i));
      });

      renderer.render(scene, camera);
     } catch (frameErr) {
       console.error('Render loop error:', frameErr);
       debugLog('Render-Fehler: ' + (frameErr && frameErr.message ? frameErr.message : frameErr));
       errEl.textContent = 'Laufzeitfehler in der AR-Szene: ' + (frameErr && frameErr.message ? frameErr.message : frameErr) +
         ' — bitte Screenshot davon schicken.';
       errEl.style.display = 'block';
       startEl.style.display = 'flex';
       renderer.setAnimationLoop(null);
     }
    });
  } catch (e) {
    debugLog('Start-Fehler: ' + (e && e.message ? e.message : e));
    errEl.textContent = 'Kamera konnte nicht gestartet werden: ' + (e && e.message ? e.message : e) +
      ' — bitte in Safari/Chrome direkt öffnen (nicht im In-App-Browser) und Kamerazugriff erlauben.';
    errEl.style.display = 'block';
  }
});

if (params.get('export') === 'true') {
  setTimeout(() => {
    debugLog('Direkter Auto-Export...');
    document.getElementById('ed-export').click();
  }, 2000);
}
</script>
</body>
</html>
